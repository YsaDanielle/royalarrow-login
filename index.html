<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to the site | Royal Arrow LMS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="page-container">
        
        <header class="top-header">
            <div class="logo-container">
                <img src="assets/royalarrow_login_logo.png" alt="Royal Arrow Logo" class="main-logo">
            </div>
            <div class="uae-badge-container">
                <img src="assets/royalarrow_login_uae.png" alt="We are proud of the UAE" class="uae-badge-img">
            </div>
        </header>

        <main class="main-content">
            
            <section class="info-section">
                <div class="info-text-wrapper">
                    <h1>Building a Safer <br>Tomorrow, <span class="text-green">Together.</span></h1>
                    <p>Awareness Training Program empowers individuals with the knowledge and tools to recognize risks and make safer decisions every day.</p>
                </div>
            </section>

            <section class="form-section">
                <div class="login-card">
                    <div class="card-tabs">
                        <button class="tab-btn active">Login</button>
                    </div>
                    
                    <div class="card-body">
                        <h2>Welcome back!</h2>
                        <p class="subtitle">Please login to your account</p>

                        <form id="loginForm">
                            <div class="input-group">
                                <i class="fa-regular fa-envelope input-icon"></i>
                                <input type="text" id="identifier" name="identifier" placeholder="Enter your email or username" autocomplete="username" required>
                            </div>

                            <div class="input-group">
                                <i class="fa-solid fa-lock input-icon"></i>
                                <input type="password" id="password" placeholder="Enter your password" required>
                                <i class="fa-regular fa-eye-slash toggle-password" id="togglePassword"></i>
                            </div>

                            <div class="form-options">
                                <label class="checkbox-container">
                                    <input type="checkbox">
                                    <span class="checkmark"></span>
                                    Remember me
                                </label>
                                <a href="#" class="forgot-link">Forgot Password?</a>
                            </div>

                            <button type="submit" class="btn-login">Login</button>
                        </form>
                    </div>
                </div>
            </section>

        </main>
        
        <div class="background-layers">
            <img src="assets/royalarrow_login_skyline.png" class="bg-skyline" alt="">
            <img src="assets/royalarrow_login_flag.png" class="bg-flag" alt="Royal Arrow Flag">
            <img src="assets/royalarrow_login_wave.png" class="bg-wave" alt="">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
